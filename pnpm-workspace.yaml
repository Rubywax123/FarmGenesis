# ============================================================================
# SECURITY: Minimum release age for npm packages (supply-chain attack defense)
# ============================================================================
#
# This setting requires that any npm package version must have been published
# for at least 1 day (1440 minutes) before pnpm will allow installing it.
# This is a critical defense against supply-chain attacks.
# DO NOT DISABLE THIS SETTING.
#
# If you absolutely need to install a package before the 1-day window has
# passed (e.g. an urgent security bugfix), add it to `minimumReleaseAgeExclude`
# below — only for packages from trusted organizations.
# ============================================================================
minimumReleaseAge: 1440

minimumReleaseAgeExclude:
  # Published by Replit and trusted.
  - '@replit/*'

# FarmForecast is a single Next.js package at the repo root — there are no
# workspace sub-packages. This file exists only to hold pnpm settings.
# (The Replit Agent scaffold's artifacts/* and lib/* packages were removed.)

autoInstallPeers: false

# Build-script allowlist. `allowBuilds` is the pnpm 11+ setting;
# `onlyBuiltDependencies` is kept for pnpm 10.x compatibility.
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  '@tailwindcss/oxide': true
  esbuild: true
  prisma: true
  sharp: true
  unrs-resolver: true

onlyBuiltDependencies:
  - '@prisma/client'
  - '@prisma/engines'
  - '@tailwindcss/oxide'
  - esbuild
  - prisma
  - unrs-resolver
